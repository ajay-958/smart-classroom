<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Intelligent Classroom</h1>

    <div class="dashboard-grid">
        <div class="card">
            <h2>Occupancy</h2>
            <p id="occ-value" class="data-value loading">--</p>
        </div>

        <div class="card">
            <h2>Air Quality</h2>
            <p id="aqi-value" class="data-value loading">--</p>
        </div>
    </div>

    <div id="status-card" class="card">
        <h2>System Intelligence</h2>
        <p id="status-message" class="loading">Syncing Nodes...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
