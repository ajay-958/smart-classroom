<!DOCTYPE html>
<html>
<head>
    <title>Classroom Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; text-align: center; }
        .container { margin-top: 50px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; display: inline-block; width: 250px; margin: 10px; border: 1px solid #334155; }
        #status-box { padding: 15px; margin-top: 20px; border-radius: 10px; font-weight: bold; }
        .value { font-size: 3em; color: #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏫 Intelligent Classroom</h1>
        
        <div class="card">
            <p>Occupancy</p>
            <div id="occ-value" class="value">0</div>
        </div>

        <div id="status-box" style="background: #334155;">
            Waiting for data...
        </div>
    </div>

    <script>
        const channelID = "YOUR_CHANNEL_ID"; // Put your ID here

        async function updateDashboard() {
            // This URL "Reads" the latest letter from the mailbox
            const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/feeds/last.json`);
            const data = await response.json();

            // Update UI
            document.getElementById('occ-value').innerText = data.field1;
            
            // Translate Status Code (Logic from our Matrix)
            let statusText = "";
            let color = "";
            if(data.field3 == 1) { statusText = "Optimal Conditions"; color = "#22c55e"; }
            else if(data.field3 == 3) { statusText = "Room Empty - Energy Saved"; color = "#3b82f6"; }
            
            document.getElementById('status-box').innerText = statusText;
            document.getElementById('status-box').style.background = color;
        }

        // Check for new data every 15 seconds
        setInterval(updateDashboard, 15000);
        updateDashboard(); // Run once on load
    </script>
</body>
</html>
