<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for the attendance list */
        .attendance-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 0 auto;
        }
        .student-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .student-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }
        .mac-address {
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--text-main);
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Spatial Attendance</h1>

    <div style="text-align: center; margin-bottom: 30px;">
        <a href="index.html" class="nav-btn">← Back to Dashboard</a>
    </div>

    <div class="attendance-container">
        <div class="header-controls">
            <h2>Devices in Zone (Verified by Both Nodes)</h2>
            <span class="badge" id="total-count" style="background: var(--neon-blue); color: #000; border: none;">Total: 0</span>
        </div>
        
        <ul class="student-list" id="device-list">
            <li style="color: var(--text-muted);">Waiting for server sync...</li>
        </ul>
    </div>

    <script src="attendance.js"></script>
</body>
</html>
